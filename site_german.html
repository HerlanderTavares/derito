<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Derito</title>

    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
        text-transform: uppercase;
      }

      h1 {
        display: inline-block;
        font-size: 5rem;
      }

      a:link,
      a:visited {
        color: currentColor;
        text-decoration: none;
        font-size: 3rem;
        transition: all 300ms ease;
        position: absolute;
        left: 7rem;
        top: 7rem;
      }

      a:hover,
      a:active {
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <h1>Seite auf deutsch</h1>

    <a href="/index.html">< Back</a>
  </body>
</html>
