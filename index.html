<!DOCTYPE html>
<html class="preload" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script type="module" defer src="/src/js/controller.js"></script>
    <link rel="stylesheet" href="src/sass/main.scss" />
    <title>Derito</title>
  </head>

  <body data-lang="english" data-root="${rootContext}">
    <header class="header">
      <div class="header__active-area">
        <nav class="navbar" data-side="right">
          <button class="navbar__close-btn">
            <svg class="icon">
              <use href="/src/imgs/icons.svg#close-btn"></use>
            </svg>
          </button>

          <ul class="navbar__list">
            <li class="navbar__item" data-nav="myMusic">
              <a href="#subhero" class="navbar__link"></a>
            </li>
            <li class="navbar__item" data-nav="myAlbums">
              <a href="#albums" class="navbar__link"></a>
            </li>
            <li class="navbar__item" data-nav="myJourney">
              <a href="#journey" class="navbar__link"></a>
            </li>
            <li class="navbar__item" data-nav="gallery">
              <a href="#gallery" class="navbar__link"></a>
            </li>
            <li class="navbar__item" data-nav="contact">
              <button class="navbar__btn"></button>
            </li>
          </ul>
        </nav>

        <div class="menu-btn__container fixed">
          <button class="menu-btn menu-btn--fixed">
            <span class="menu-btn__icon"></span>
            <span class="menu-btn__icon"></span>
            <span class="menu-btn__icon"></span>
          </button>
        </div>

        <section class="hero">
          <div class="menu-btn__container">
            <div class="lang-menu preload" data-menu="mobile">
              <ul class="lang-menu__list preload">
                <li class="lang-menu__item preload" data-flag-number="0" data-lang="english">
                  <a class="lang-menu__link" href="/index.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#england"></use></svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="1" data-lang="french">
                  <a class="lang-menu__link" href="/site_french.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#france"></use></svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="2" data-lang="portuguese">
                  <a class="lang-menu__link" href="/site_portuguese.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#portugal"></use></svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="3" data-lang="spanish">
                  <a class="lang-menu__link" href="/site_spanish.html">
                    <svg class="flag">
                      <use href="/src/imgs/flags.svg#spain"></use>
                    </svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="4" data-lang="german">
                  <a class="lang-menu__link" href="/site_german.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#germany"></use></svg>
                  </a>
                </li>
              </ul>

              <button class="lang-menu__btn preload">
                <svg class="flag"></svg>
              </button>
            </div>

            <button class="menu-btn menu-btn--hero">
              <span class="menu-btn__icon"></span>
              <span class="menu-btn__icon"></span>
              <span class="menu-btn__icon"></span>
            </button>
          </div>

          <div class="hero__img-container img-shadow--container">
            <img
              src="/src/imgs/01-hero/hero-img.png"
              alt="Derito sitting down"
              class="hero__img img-shadow"
            />
          </div>

          <div class="hero__img-container">
            <img src="/src/imgs/01-hero/hero-img.png" alt="Derito sitting down" class="hero__img" />
          </div>

          <div class="hero__content">
            <h1 class="hero__title">Derito</h1>

            <div class="lang-menu preload" data-menu="desktop">
              <ul class="lang-menu__list preload">
                <li class="lang-menu__item preload" data-flag-number="0" data-lang="english">
                  <a class="lang-menu__link" href="/index.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#england"></use></svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="1" data-lang="french">
                  <a class="lang-menu__link" href="/site_french.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#france"></use></svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="2" data-lang="portuguese">
                  <a class="lang-menu__link" href="/site_portuguese.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#portugal"></use></svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="3" data-lang="spanish">
                  <a class="lang-menu__link" href="/site_spanish.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#spain"></use></svg>
                  </a>
                </li>
                <li class="lang-menu__item preload" data-flag-number="4" data-lang="german">
                  <a class="lang-menu__link" href="/site_german.html">
                    <svg class="flag"><use href="/src/imgs/flags.svg#germany"></use></svg>
                  </a>
                </li>
              </ul>

              <button class="lang-menu__btn preload">
                <svg class="flag"></svg>
              </button>
            </div>
          </div>
        </section>
      </div>
    </header>

    <main>
      <section class="subhero" id="subhero">
        <h2 class="subhero__title">Angolan Musician & Composer</h2>
      </section>

      <section class="music" id="music">
        <div class="active-area">
          <div class="music-grid">
            <div class="section-title">
              <span class="section-title__sub">My Styles</span>
              <span class="section-title__main">Of Music</span>
            </div>

            <!-- *********** Semba Card *********** -->
            <div class="music-card semba" data-style="semba">
              <div class="music-card__container">
                <div class="music-card__bkg"></div>
                <div class="music-card__img"></div>

                <div class="music-card__content">
                  <span class="music-card__title" data-title="content">Semba</span>
                  <p></p>
                </div>
                <span class="music-card__title" data-title="image">Semba</span>
              </div>

              <div class="player">
                <audio src="/src/mp3/mix_african-music.mp3"></audio>
                <div class="player__active-area">
                  <div class="player__body">
                    <div class="player__border">
                      <button class="player__play-btn">
                        <svg class="icon play-icon">
                          <use href="/src/imgs/icons.svg#play-btn"></use>
                        </svg>
                        <span class="pause-icon">
                          <div></div>
                          <div></div>
                        </span>
                      </button>
                      <div class="player__seeker">
                        <div class="player__seeker-bar">
                          <div class="player__seeker-progress-bar"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <button class="music-card__learn">
                <span>Learn More</span>
                <svg class="icon"><use href="/src/imgs/icons.svg#arrow-forward"></use></svg>
              </button>
            </div>
            <!-- *********** Semba Card *********** -->

            <!-- *********** Afrojazz Card *********** -->
            <div class="music-card afrojazz landscape left" data-style="afrojazz">
              <div class="music-card__container">
                <div class="music-card__bkg"></div>
                <div class="music-card__img"></div>

                <div class="music-card__content">
                  <span class="music-card__title" data-title="content">Afrojazz</span>
                  <p></p>
                </div>
                <span class="music-card__title" data-title="image">Afrojazz</span>
              </div>

              <div class="player">
                <audio src="/src/mp3/mix_afrojazz.mp3"></audio>
                <div class="player__active-area">
                  <div class="player__body">
                    <div class="player__border">
                      <button class="player__play-btn">
                        <svg class="icon play-icon">
                          <use href="/src/imgs/icons.svg#play-btn"></use>
                        </svg>
                        <span class="pause-icon">
                          <div></div>
                          <div></div>
                        </span>
                      </button>
                      <div class="player__seeker">
                        <div class="player__seeker-bar">
                          <div class="player__seeker-progress-bar"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <button class="music-card__learn">
                <span>Learn More</span>
                <svg class="icon">
                  <use href="/src/imgs/icons.svg#arrow-back"></use>
                </svg>
              </button>
            </div>
            <!-- *********** Afrojazz Card *********** -->

            <!-- *********** Afrobossa Card *********** -->
            <div class="music-card afrobossa" data-style="afrobossa">
              <div class="music-card__container">
                <div class="music-card__bkg"></div>
                <div class="music-card__img"></div>

                <div class="music-card__content">
                  <span class="music-card__title" data-title="content">Afrobossa</span>
                  <p></p>
                </div>
                <span class="music-card__title" data-title="image">Afrobossa</span>
              </div>

              <div class="player">
                <audio src="/src/mp3/mix_afrobossa.mp3"></audio>
                <div class="player__active-area">
                  <div class="player__body">
                    <div class="player__border">
                      <button class="player__play-btn">
                        <svg class="icon play-icon">
                          <use href="/src/imgs/icons.svg#play-btn"></use>
                        </svg>
                        <span class="pause-icon">
                          <div></div>
                          <div></div>
                        </span>
                      </button>
                      <div class="player__seeker">
                        <div class="player__seeker-bar">
                          <div class="player__seeker-progress-bar"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <button class="music-card__learn">
                <span>Learn More</span>
                <svg class="icon">
                  <use href="/src/imgs/icons.svg#arrow-forward"></use>
                </svg>
              </button>
            </div>
            <!-- *********** Afrobossa Card *********** -->
          </div>
        </div>
      </section>

      <section class="album" id="albums">
        <div class="album-bkg"></div>
        <div class="active-area">
          <div class="album-menu">
            <div class="album-grid">
              <button class="album__cover" data-album="saudade"></button>
              <button class="album__cover" data-album="alison"></button>
              <button class="album__cover" data-album="discernimento"></button>
              <button class="album__cover" data-album="best-of"></button>
            </div>

            <div class="section-title">
              <span class="section-title__main">My Albums</span>
            </div>
          </div>

          <div class="album-container">
            <div class="section-title">
              <span class="section-title__main">My Albums</span>
            </div>

            <div class="carousel-menu">
              <button class="carousel-menu__btn" data-btn="prev">
                <svg class="icon"><use href="/src/imgs/icons.svg#arrow-back"></use></svg>
              </button>

              <div class="carousel-menu__crumbs"></div>

              <button class="carousel-menu__btn" data-btn="next">
                <svg class="icon"><use href="/src/imgs/icons.svg#arrow-forward"></use></svg>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="journey" id="journey">
        <div class="active-area">
          <div class="section-title">
            <span class="section-title__main">My Journey</span>
          </div>

          <!-- **************************************
               BIOGRAPHY
          **************************************** -->
          <div class="biography">
            <h2 class="journey__subtitle">Biography</h2>
            <div class="biography-info preload" data-bio="whoAmI">
              <button class="biography-info__btn">
                <span class="title">Who Am I</span>
                <div class="img">
                  <div class="pointer">
                    <svg class="icon"><use href="/src/imgs/icons.svg#arrow-down"></use></svg>
                  </div>
                </div>
              </button>
              <div class="biography-info__content preload">
                <span></span>
                <p></p>
              </div>
              <button class="biography-info__back-btn preload">
                <svg class="icon"><use href="/src/imgs/icons.svg#arrow-back"></use></svg>
                <span>Back</span>
              </button>
            </div>

            <div class="biography-info preload" data-bio="earlyDays">
              <button class="biography-info__btn">
                <span class="title">Early Days</span>
                <div class="img">
                  <div class="pointer">
                    <svg class="icon"><use href="/src/imgs/icons.svg#arrow-down"></use></svg>
                  </div>
                </div>
              </button>
              <div class="biography-info__content preload">
                <span></span>
                <p></p>
              </div>
              <button class="biography-info__back-btn preload">
                <svg class="icon"><use href="/src/imgs/icons.svg#arrow-back"></use></svg>
                <span>Back</span>
              </button>
            </div>

            <div class="biography-info preload" data-bio="myCareer">
              <button class="biography-info__btn">
                <span class="title">My Career</span>
                <div class="img">
                  <div class="pointer">
                    <svg class="icon"><use href="/src/imgs/icons.svg#arrow-down"></use></svg>
                  </div>
                </div>
              </button>
              <div class="biography-info__content preload">
                <span></span>
                <p></p>
              </div>
              <button class="biography-info__back-btn preload">
                <svg class="icon"><use href="/src/imgs/icons.svg#arrow-back"></use></svg>
                <span>Back</span>
              </button></div
            >
          </div>

          <!-- **************************************
               FEATURES
          **************************************** -->
          <div class="features">
            <h2 class="journey__subtitle">Whom I've Met</h2>
            <button class="features__nav-btn" data-btn="prev">
              <svg class="icon"><use href="/src/imgs/icons.svg#arrow-back"></use></svg>
            </button>

            <div class="features-container"></div>

            <button class="features__nav-btn" data-btn="next">
              <svg class="icon"><use href="/src/imgs/icons.svg#arrow-forward"></use></svg>
            </button>
          </div>

          <!-- **************************************
               EVENTS
          **************************************** -->
          <div class="events">
            <h2 class="journey__subtitle">Where I've Been</h2>

            <!-- *********** Map *********** -->
            <div class="events-map">
              <div class="events-map__prompt">
                <span>Touch to Open</span>
                <svg class="icon"><use href="/src/imgs/icons.svg#pointer"></use></svg>
              </div>
              <div class="events-map__dropshadow">
                <div class="events-map__border">
                  <div class="events-map__container"></div>
                  <div class="fold__shadows-container"></div>
                </div>
              </div>
            </div>
            <!-- *********** Map *********** -->
          </div>
        </div>
      </section>

      <section class="gallery" id="gallery">
        <div class="active-area">
          <div class="section-title">
            <span class="section-title__main">Gallery</span>
          </div>
          <div class="gallery-container photos">
            <div class="gallery__switch">
              <button class="gallery__switch--btn" data-switch="photos">
                <svg class="icon"><use href="/src/imgs/icons.svg#tri-right"></use></svg>
                <span>Photos</span>
              </button>

              <span class="separator">|</span>

              <button class="gallery__switch--btn" data-switch="videos">
                <span>Videos</span>
                <svg class="icon"><use href="/src/imgs/icons.svg#tri-left"></use></svg>
              </button>
            </div>

            <button class="gallery__nav-btn" data-gallery="photos" data-btn="prev">
              <svg class="icon"><use href="/src/imgs/icons.svg#arrow-back"></use></svg>
            </button>

            <button class="gallery__nav-btn" data-gallery="videos" data-btn="prev">
              <svg class="icon"><use href="/src/imgs/icons.svg#arrow-back"></use></svg>
            </button>

            <div class="gallery__photos-container" data-gallery="photos">
              <div class="gallery__photos" data-photos="main"></div>
            </div>

            <div class="gallery-videos" data-gallery="videos"></div>

            <div class="gallery-videos__menu" data-gallery="videos"></div>

            <button class="gallery__nav-btn" data-gallery="videos" data-btn="next">
              <svg class="icon"><use href="/src/imgs/icons.svg#arrow-forward"></use></svg>
            </button>

            <button class="gallery__nav-btn" data-gallery="photos" data-btn="next">
              <svg class="icon"><use href="/src/imgs/icons.svg#arrow-forward"></use></svg>
            </button>
          </div>
        </div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
